<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="100" height="100">
  <defs>
    <!-- Gradient for background shield/circle -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <!-- Glowing shadow drop-shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer glowing ring/shield -->
  <rect x="5" y="5" width="90" height="90" rx="24" fill="url(#bgGradient)" filter="url(#glow)" />
  
  <!-- Inner dark card for contrast -->
  <rect x="8" y="8" width="84" height="84" rx="21" fill="#0f172a" />
  
  <!-- Stylized Robot Face with Chat bubble and audio lines -->
  <g transform="translate(18, 18)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Chat/Head outer frame -->
    <path d="M8 8 H56 C60 8 64 12 64 16 V40 C64 44 60 48 56 48 H32 L16 58 V48 H8 C4 48 0 44 0 40 V16 C0 12 4 8 8 8 Z" fill="url(#bgGradient)" opacity="0.15" />
    <path d="M8 8 H56 C60 8 64 12 64 16 V40 C64 44 60 48 56 48 H32 L16 58 V48 H8 C4 48 0 44 0 40 V16 C0 12 4 8 8 8 Z" stroke="url(#bgGradient)" stroke-width="3" />
    
    <!-- Robot Antenna -->
    <line x1="32" y1="8" x2="32" y2="2" stroke="url(#bgGradient)" stroke-width="3" />
    <circle cx="32" cy="2" r="3" fill="#8b5cf6" />
    
    <!-- Eyes -->
    <circle cx="20" cy="26" r="4" fill="#3b82f6" />
    <circle cx="20" cy="26" r="1.5" fill="#ffffff" />
    <circle cx="44" cy="26" r="4" fill="#3b82f6" />
    <circle cx="44" cy="26" r="1.5" fill="#ffffff" />
    
    <!-- Speaking Audio Waves mouth -->
    <path d="M 22 38 Q 27 42 32 38 Q 37 42 42 38" stroke="url(#bgGradient)" stroke-width="2.5" fill="none" />
    
    <!-- Sparkles / Tech accents inside the bubble -->
    <path d="M 52 18 L 54 22 L 58 22 L 55 24 L 56 28 L 52 26 L 48 28 L 49 24 L 46 22 L 50 22 Z" fill="#eab308" transform="scale(0.5) translate(46, 6)" />
  </g>
</svg>